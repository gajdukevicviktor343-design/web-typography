<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Веб-типографіка</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Мій сучасний сайт</h1>
    <nav>
        <ul>
            <li>Головна</li>
            <li>Послуги</li>
            <li>Контакти</li>
        </ul>
    </nav>
</header>

<section class="content">
    <h2>Веб-типографіка</h2>
    <p>
        На цьому сайті використано нестандартний шрифт, Google Fonts,
        іконкові шрифти та SVG-графіку.
    </p>
</section>

<!-- ІКОНКИ -->
<section class="icons">
    <h2>Наші можливості</h2>

    <div class="icon-box">
        <i class="fas fa-laptop"></i>
        <p>Розробка</p>
    </div>

    <div class="icon-box">
        <i class="fas fa-mobile-alt"></i>
        <p>Адаптивність</p>
    </div>

    <div class="icon-box">
        <i class="fas fa-code"></i>
        <p>Чистий код</p>
    </div>
</section>

<!-- SVG -->
<section class="svg-section">
    <h2>SVG елементи</h2>

    <div class="svg-block">
        <svg viewBox="0 0 24 24">
            <path d="M12 2l3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1 3-7z"/>
        </svg>
        <p>Якість</p>
    </div>

    <div class="svg-block">
        <svg viewBox="0 0 24 24">
            <path d="M3 21l1-4 14-14 4 4-14 14-4 1z"/>
        </svg>
        <p>Дизайн</p>
    </div>

    <div class="svg-block">
        <svg viewBox="0 0 24 24">
            <path d="M12 2l7 4v6c0 5-3 9-7 10-4-1-7-5-7-10V6l7-4z"/>
        </svg>
        <p>Надійність</p>
    </div>

</section>

<footer>
    <p>© 2026 Мій сайт</p>
</footer>

</body>
</html>
